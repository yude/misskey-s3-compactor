apiVersion: v1
kind: Secret
metadata:
  name: misskey-compactor-s3
  namespace: misskey-compactor
  labels:
    app.kubernetes.io/name: misskey-s3-compactor
type: Opaque
stringData:
  # Replace these placeholders before applying. Consider SealedSecrets /
  # ExternalSecrets / sops for production. NEVER commit real credentials.
  S3_BUCKET: "REPLACE_BUCKET_NAME"
  AWS_ACCESS_KEY_ID: "REPLACE_KEY_ID"
  AWS_SECRET_ACCESS_KEY: "REPLACE_SECRET_KEY"
  # Optional, set only when using STS temporary credentials.
  AWS_SESSION_TOKEN: ""