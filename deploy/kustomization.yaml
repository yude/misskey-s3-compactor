# kustomize overlay for the default deployment target.
# Apply with:
#   kubectl apply -k deploy/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: misskey-compactor

labels:
- includeTemplates: true
  pairs:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: misskey-s3-compactor

resources:
- namespace.yaml
- rbac.yaml
- configmap.yaml
- secret.yaml
- cronjob.yaml

# The container image digest/tag should be pinned per environment. Override
# via `kustomize edit set image` in CI after each successful build:
#   kustomize edit set image ghcr.io/yude/misskey-s3-compactor=ghcr.io/yude/misskey-s3-compactor:<tag>@sha256:...
images:
- digest: sha256:0cb6037e69a68369e15b8b2c7a8ca4cc12b3b0003c96f8e9f6acf85e9864f481
  name: ghcr.io/yude/misskey-s3-compactor
  newName: ghcr.io/yude/misskey-s3-compactor
