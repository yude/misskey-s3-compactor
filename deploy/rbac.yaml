apiVersion: v1
kind: ServiceAccount
metadata:
  name: misskey-compactor
  namespace: misskey-compactor
  labels:
    app.kubernetes.io/name: misskey-s3-compactor
---
# The cronjob needs to read its credentials Secret. Scoping the SA to this
# namespace keeps the blast-radius minimal.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: misskey-compactor
  namespace: misskey-compactor
  labels:
    app.kubernetes.io/name: misskey-s3-compactor
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["misskey-compactor-s3"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: misskey-compactor
  namespace: misskey-compactor
  labels:
    app.kubernetes.io/name: misskey-s3-compactor
subjects:
  - kind: ServiceAccount
    name: misskey-compactor
    namespace: misskey-compactor
roleRef:
  kind: Role
  name: misskey-compactor
  apiGroup: rbac.authorization.k8s.io