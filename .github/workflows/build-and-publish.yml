name: build-and-publish

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "deploy/**"
      - ".github/workflows/build-and-publish.yml"
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: lint + unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::files need gofmt: $out"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race -count=1 ./...

  docker:
    name: build & push image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.5.0"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          outputs: |
            type=image,name=ghcr.io/${{ steps.repo.outputs.name }},name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        id: digest
        run: |
          digest=$(echo "${{ steps.build.outputs.digest }}" | cut -d: -f2)
          echo "digest=${digest}"        >> "$GITHUB_OUTPUT"
          echo "short=${digest:0:12}"    >> "$GITHUB_OUTPUT"

      # Pin the freshly built image digest into the manifest for reproducibility.
      - name: Update kustomize image reference
        if: github.event_name != 'pull_request'
        working-directory: deploy
        run: |
          IMAGE="ghcr.io/${{ steps.repo.outputs.name }}"
          kustomize edit set image "${IMAGE}=${IMAGE}@sha256:${{ steps.digest.outputs.digest }}"

      - name: Verify kustomize build
        if: github.event_name != 'pull_request'
        # No Kubernetes cluster is available in CI, so kubectl-based
        # validation always fails trying to reach localhost:8080.
        # kustomize build itself validates the manifests structurally;
        # we just confirm it produces non-empty YAML here.
        run: |
          out=$(kustomize build deploy)
          if [ -z "$out" ]; then
            echo "::error::kustomize build produced empty output"
            exit 1
          fi
          echo "$out" | head -5

      - name: Commit pinned manifest back
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/kustomization.yaml
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "chore(deploy): pin image to sha-${{ steps.digest.outputs.short }} [skip ci]"
          git push